apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: log-consumer-debug
objects:
- apiVersion: v1
  kind: ConfigMap
  metadata:
    name: test-export-script
  data:
    test-export.sh: |
      #!/bin/bash
      set -euo pipefail

      TIMESTAMP=$(date -u '+%Y%m%dT%H0000Z')
      LOCAL_FILE="/tmp/pulp_access_logs_${TIMESTAMP}.parquet"
      CLOUDWATCH_LOG_GROUP="${CLOUDWATCH_LOG_GROUP:-}"

      echo "============================================================"
      echo "Access Logs Export - Test Script"
      echo "============================================================"
      echo "Timestamp:  ${TIMESTAMP}"
      echo "Local file: ${LOCAL_FILE}"
      echo ""

      # Install exporter
      echo ">> Installing pulp-access-logs-exporter..."
      export UV_INDEX="https://${PYPI_USERNAME}:${PYPI_PASSWORD}@${PULP_PYPI_HOST}/simple/"
      pip install uv
      uv pip install pulp-access-logs-exporter

      export PATH=${PATH}:/tmp/bin
      mkdir -p /tmp/bin
      curl -L https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64 -o /tmp/bin/jq
      chmod +x /tmp/bin/jq

      echo ""

      # 1. Query CloudWatch and write to local file
      echo ">> Querying CloudWatch and writing local parquet..."
      START_TIME=$(date -u -d '1 hour ago' '+%Y-%m-%dT%H:00:00Z')
      END_TIME=$(date -u -d '1 hour ago' '+%Y-%m-%dT%H:59:59Z')
      export-access-logs \
        --cloudwatch-group "${CLOUDWATCH_LOG_GROUP}" \
        --start-time "${START_TIME}" \
        --end-time "${END_TIME}" \
        --output-path "${LOCAL_FILE}" \
        --aws-region "${AWS_REGION}"
      echo ""

      # 2. Upload to dataverse S3 bucket
      if [ -n "${S3_ACCESS_KEY_ID:-}" ] && [ -n "${S3_SECRET_ACCESS_KEY:-}" ]; then
        echo ">> Uploading to dataverse S3 bucket..."
        upload-parquet \
          --source "${LOCAL_FILE}" \
          --destination "s3://${S3_BUCKET_NAME}/${S3_BUCKET_PREFIX}/pulp_access_logs_${TIMESTAMP}.parquet" \
          --s3-access-key-id "${S3_ACCESS_KEY_ID}" \
          --s3-secret-access-key "${S3_SECRET_ACCESS_KEY}"
        echo ""
      else
        echo ">> Skipping dataverse upload (S3_ACCESS_KEY_ID not set)"
      fi

      # 3. Upload to Clowder objectStore bucket (redundancy)
      if [ -f /cdapp/cdappconfig.json ]; then
        OBJSTORE_ACCESS_KEY=$(jq -r --arg name "${OBJECT_STORE_NAME}" '.objectStore.buckets[] | select(.requestedName == $name) | .accessKey' /cdapp/cdappconfig.json)
        if [ -n "${OBJSTORE_ACCESS_KEY}" ] && [ "${OBJSTORE_ACCESS_KEY}" != "null" ]; then
          OBJSTORE_SECRET_KEY=$(jq -r --arg name "${OBJECT_STORE_NAME}" '.objectStore.buckets[] | select(.requestedName == $name) | .secretKey' /cdapp/cdappconfig.json)
          OBJSTORE_BUCKET=$(jq -r --arg name "${OBJECT_STORE_NAME}" '.objectStore.buckets[] | select(.requestedName == $name) | .name' /cdapp/cdappconfig.json)
          OBJSTORE_ENDPOINT=$(jq -r --arg name "${OBJECT_STORE_NAME}" '.objectStore.buckets[] | select(.requestedName == $name) | .endpoint' /cdapp/cdappconfig.json)
          echo ">> Uploading to objectStore bucket (${OBJSTORE_BUCKET})..."
          upload-parquet \
            --source "${LOCAL_FILE}" \
            --destination "s3://${OBJSTORE_BUCKET}/pulp_access_logs_${TIMESTAMP}.parquet" \
            --s3-access-key-id "${OBJSTORE_ACCESS_KEY}" \
            --s3-secret-access-key "${OBJSTORE_SECRET_KEY}" \
            ${OBJSTORE_ENDPOINT:+--s3-endpoint-url "http://${OBJSTORE_ENDPOINT}:9000"}
        else
          echo ">> Skipping objectStore upload (bucket '${OBJECT_STORE_NAME}' not found in cdappconfig.json)"
        fi
      else
        echo ">> Skipping objectStore upload (no cdappconfig.json)"
      fi

      echo ""
      echo "============================================================"
      echo "Done!"
      echo "============================================================"

- apiVersion: cloud.redhat.com/v1alpha1
  kind: ClowdApp
  metadata:
    name: log-consumer
  spec:
    envName: "${ENV_NAME}"
    deployments:
    - name: consumer
      replicas: 1
      podSpec:
        image: ${DEBUG_IMAGE}:${DEBUG_IMAGE_TAG}
        command: ['tail', '-f', '/dev/null']
        volumeMounts:
          - name: test-export-script
            mountPath: /opt/app-root/src/test-export.sh
            subPath: test-export.sh
        volumes:
          - name: test-export-script
            configMap:
              name: test-export-script
              defaultMode: 0755
        resources:
          requests:
            cpu: 1000m
            memory: 1Gi
          limits:
            cpu: 1500m
            memory: 1.5Gi
        env:
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: cloudwatch-pulp-log-access-read-only
                key: aws_access_key_id
                optional: false
          - name: AWS_REGION
            valueFrom:
              secretKeyRef:
                name: cloudwatch-pulp-log-access-read-only
                key: aws_region
                optional: false
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: cloudwatch-pulp-log-access-read-only
                key: aws_secret_access_key
                optional: false
          - name: OBJECT_STORE_NAME
            value: ${{OBJECT_STORE_NAME}}
          - name: PULP_PYPI_HOST
            value: ${{PULP_PYPI_HOST}}
          - name: PYPI_USERNAME
            value: ${{PYPI_USERNAME}}
          - name: PYPI_PASSWORD
            value: ${{PYPI_PASSWORD}}
          - name: CLOUDWATCH_LOG_GROUP
            value: ${{CLOUDWATCH_LOG_GROUP}}
          - name: S3_BUCKET_NAME
            value: ${{S3_BUCKET_NAME}}
          - name: S3_BUCKET_PREFIX
            value: ${{S3_BUCKET_PREFIX}}
          - name: S3_ACCESS_KEY_ID
            value: ${{S3_ACCESS_KEY_ID}}
          - name: S3_SECRET_ACCESS_KEY
            value: ${{S3_SECRET_ACCESS_KEY}}

    objectStore:
      - ${OBJECT_STORE_NAME}

parameters:
  - name: ENV_NAME
    description: Specify your (ephemeral) namespace
    required: true
  - name: DEBUG_IMAGE
    description: Debug container image (UBI9 or similar)
    value: registry.access.redhat.com/ubi9/python-312
  - name: DEBUG_IMAGE_TAG
    description: Debug container image tag
    value: latest
  - name: OBJECT_STORE_NAME
    description: The name of the S3 bucket
    value: pulp-log-export-s3
  - name: PULP_PYPI_HOST
    description: Hostname and path of the internal Pulp PyPI index
    required: true
  - name: PYPI_USERNAME
    description: Username for the internal Pulp PyPI index
    required: true
  - name: PYPI_PASSWORD
    description: Password/token for the internal Pulp PyPI index
    required: true
  - name: CLOUDWATCH_LOG_GROUP
    description: CloudWatch log group name
    required: true
  - name: S3_BUCKET_NAME
    description: S3 bucket name for dataverse
    required: false
  - name: S3_BUCKET_PREFIX
    description: S3 key prefix within the bucket
    required: false
  - name: S3_ACCESS_KEY_ID
    description: AWS access key for dataverse S3
    required: false
  - name: S3_SECRET_ACCESS_KEY
    description: AWS secret key for dataverse S3
    required: false
